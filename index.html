<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>プロンプトエンジニアリングを体験しよう</title>
  <style>
    :root {
      --bg-0: #f5f7fb;
      --bg-1: #eef2ff;
      --ink-0: #0f172a;
      --ink-1: #475569;
      --accent: #0ea5e9;
      --card: rgba(255, 255, 255, 0.86);
      --line: rgba(15, 23, 42, 0.08);
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
      color: var(--ink-0);
      background:
        radial-gradient(1000px 600px at 10% -10%, #dbeafe 0%, transparent 60%),
        radial-gradient(800px 500px at 110% 0%, #e0f2fe 0%, transparent 60%),
        linear-gradient(160deg, var(--bg-0) 0%, var(--bg-1) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(880px, 100%);
    }

    .header {
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 2.5vw, 2.3rem);
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 8px 0 0;
      color: var(--ink-1);
      font-size: 0.98rem;
    }

    .panel {
      backdrop-filter: blur(6px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 2px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .status {
      margin: 0;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      color: var(--ink-1);
      font-size: 0.92rem;
    }

    .link-list {
      list-style: none;
      margin: 0;
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .item {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      padding: 14px 16px;
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
    }

    .item:hover,
    .item:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(14, 165, 233, 0.35);
      box-shadow: 0 10px 22px rgba(14, 165, 233, 0.2);
      outline: none;
    }

    .item-title {
      display: block;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .item-url {
      display: block;
      color: var(--ink-1);
      font-size: 0.88rem;
      overflow-wrap: anywhere;
    }

    .item-title::after {
      content: " \2197";
      color: var(--accent);
      font-weight: 500;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="shell" aria-labelledby="page-title">
    <header class="header">
      <h1 id="page-title">プロンプトエンジニアリングを体験しよう</h1>
      <p class="lead">link.json からリンクを読み込みます</p>
    </header>

    <section class="panel" aria-live="polite">
      <p id="status" class="status">読み込み中...</p>
      <ul id="linkList" class="link-list hidden"></ul>
    </section>
  </main>

  <script type="module" src="./script.js"></script>
</body>
</html>
